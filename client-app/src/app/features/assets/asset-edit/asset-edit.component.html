<div class="max-w-2xl mx-auto space-y-6">
  
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-2xl font-bold text-gray-900">Edit Asset</h2>
      <p class="mt-1 text-sm text-gray-500">Update the value or remove this asset from your vault.</p>
    </div>
    <a routerLink="/dashboard" class="text-sm font-medium text-blue-600 hover:text-blue-500">
      &larr; Back to Dashboard
    </a>
  </div>

  <div class="bg-white shadow rounded-lg border border-gray-100 p-6 sm:p-8">
    
    <div class="mb-6 pb-6 border-b border-gray-200">
      <h3 class="text-lg font-medium text-gray-900">{{ assetName() }}</h3>
      <p class="text-sm text-gray-500">Asset ID: {{ assetId }}</p>
    </div>

    <form [formGroup]="editForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div>
        <label for="value" class="block text-sm font-medium text-gray-700">Current Estimated Value ($)</label>
        <div class="mt-1">
          <input type="number" id="value" formControlName="value" step="0.01" min="0"
                 class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
      </div>

      <div class="pt-4 flex items-center justify-between border-t border-gray-200">
        <button type="button" (click)="onDelete()"
                class="inline-flex justify-center py-2 px-4 border border-red-300 shadow-sm text-sm font-medium rounded-md text-red-700 bg-white hover:bg-red-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-colors">
          Delete Asset
        </button>
        
        <button type="submit" [disabled]="editForm.invalid || isSubmitting"
                class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:bg-blue-300 transition-colors">
          {{ isSubmitting ? 'Updating...' : 'Update Value' }}
        </button>
      </div>

    </form>
  </div>
</div>
