<div class="max-w-2xl mx-auto space-y-6">
  
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-2xl font-bold text-gray-900">Add New Asset</h2>
      <p class="mt-1 text-sm text-gray-500">Record a new asset into your personal vault.</p>
    </div>
    <a routerLink="/dashboard" class="text-sm font-medium text-blue-600 hover:text-blue-500">
      &larr; Back to Dashboard
    </a>
  </div>

  <div class="bg-white shadow rounded-lg border border-gray-100 p-6 sm:p-8">
    
    <form [formGroup]="assetForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700">Asset Name</label>
        <div class="mt-1">
          <input type="text" id="name" formControlName="name" placeholder="e.g. Tesla Stock, Primary Residence"
                 class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
      </div>

      <div>
        <label for="value" class="block text-sm font-medium text-gray-700">Estimated Value ($)</label>
        <div class="mt-1">
          <input type="number" id="value" formControlName="value" step="0.01" min="0"
                 class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
      </div>

      <div>
        <label for="categoryId" class="block text-sm font-medium text-gray-700">Category Database ID</label>
        <div class="mt-1">
          <input type="text" id="categoryId" formControlName="categoryId" placeholder="Paste a valid Guid from SQLite"
                 class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
      </div>

      <div>
        <label for="acquiredAt" class="block text-sm font-medium text-gray-700">Date Acquired</label>
        <div class="mt-1">
          <input type="date" id="acquiredAt" formControlName="acquiredAt"
                 class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
      </div>

      <div class="pt-4 flex items-center justify-end border-t border-gray-200">
        <button type="submit" [disabled]="assetForm.invalid || isSubmitting"
                class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:bg-blue-300 transition-colors">
          {{ isSubmitting ? 'Saving...' : 'Save Asset' }}
        </button>
      </div>

    </form>
  </div>
</div>
